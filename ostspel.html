<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheese Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#065f46,#10b981);
    height:100vh;
}

h1{
    color:white;
    margin-top:15px;
}

p{
    color:white;
    font-size:22px;
    font-weight:bold;
}

#score,
#timer{
    color:yellow;
}

#cheese{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    font-size:50px;
    border:none;
    background:white;
    border-radius:20px;
    padding:10px;
    cursor:pointer;
}

#messageBox{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:#065f46;
    padding:25px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    z-index:9999;
}

#playAgainBtn,
#backBtn{
    background:#10b981;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
    margin:8px;
}

@media(max-width:768px){
    #cheese{
        font-size:42px;
    }
}
</style>
</head>

<body>

<h1>🧀 Cheese Game</h1>

<p>Time: <span id="timer">60</span></p>
<p>Score: <span id="score">0</span></p>

<button id="cheese" onclick="eatCheese()">🧀</button>

<div id="messageBox">
    <h2>⏰ Time's Up!</h2>
    <p>Your Score: <span id="finalScore">0</span></p>
    <button id="playAgainBtn" onclick="playAgain()">🔁 Play Again</button>
    <a href="index.html" id="backBtn">⬅ Back</a>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let score = 0;
let timeLeft = 60;
let musicStarted = false;
let gameOver = false;

let timerInterval = setInterval(function(){

    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    if(timeLeft <= 0){
        clearInterval(timerInterval);
        gameOver = true;

        document.getElementById("cheese").style.display = "none";
        document.getElementById("finalScore").textContent = score;
        document.getElementById("messageBox").style.display = "block";
    }

}, 1000);

function eatCheese(){

    if(gameOver){
        return;
    }

    if(!musicStarted){
        document.getElementById("music").play();
        musicStarted = true;
    }

    score++;
    document.getElementById("score").textContent = score;

    let cheese = document.getElementById("cheese");

    let maxX = window.innerWidth - cheese.offsetWidth;
    let maxY = window.innerHeight - cheese.offsetHeight - 80;

    let randomX = Math.random() * maxX;
    let randomY = Math.random() * maxY + 80;

    cheese.style.left = randomX + "px";
    cheese.style.top = randomY + "px";
    cheese.style.transform = "none";
}

function playAgain(){
    location.reload();
}
</script>

</body>
</html>
