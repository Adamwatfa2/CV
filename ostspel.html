<!DOCTYPE html>
<html>
<head>
<title>Ostspel</title>
</head>
    <style>
body{
    background: linear-gradient(135deg, #d1fae5, #10b981);
    font-family: Arial, sans-serif;
    text-align: center;
    overflow: hidden;
    margin: 0;
    height: 100vh;
}

h1{
    color: white;
    text-shadow: 2px 2px 5px black;
}

p{
    color: white;
    font-size: 24px;
    font-weight: bold;
}

#cheese{
    border: none;
    background: white;
    border-radius: 20px;
    padding: 10px;
    cursor: pointer;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

#cheese:hover{
    transform: scale(1.1);
}
</style>
<body style="text-align:center; background:#d1fae5; overflow:hidden;">

<h1>🧀 CHEESE GAME</h1>
<p>POINTS: <span id="score">0</span></p>

<button id="cheese"
onclick="eatCheese()"
style="
font-size:50px;
position:absolute;
left:200px;
top:200px;
">
🧀
</button>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<br><br>

<a href="index.html">⬅ BACK</a>

<script>
let score = 0;
let size = 50;
let started = false;

function eatCheese(){

    if(!started){
        document.getElementById("music").play();
        started = true;
    }

    score++;
    document.getElementById("score").textContent = score;

    size += 5;

    let cheese = document.getElementById("cheese");

    cheese.style.fontSize = size + "px";

    cheese.style.left =
    Math.random() * (window.innerWidth - 100) + "px";

    cheese.style.top =
    Math.random() * (window.innerHeight - 150) + "px";
}
</script>

</body>
</html>
