<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheese Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#065f46,#10b981);
    height:100vh;
}

h1{
    color:white;
    margin-top:15px;
    font-size:32px;
}

p{
    color:white;
    font-size:22px;
    font-weight:bold;
}

#score,
#timer{
    color:yellow;
}

#cheese{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    font-size:50px;
    border:none;
    background:white;
    border-radius:20px;
    padding:10px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

#backBtn{
    position:fixed;
    bottom:15px;
    left:15px;
    background:white;
    color:#065f46;
    padding:10px 15px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

#leaderboard{
    position:fixed;
    top:20px;
    right:20px;
    background:white;
    color:#065f46;
    padding:15px;
    border-radius:15px;
    width:220px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    text-align:left;
}

#leaderboard h2{
    text-align:center;
    margin:0 0 10px 0;
}

#leaderboard ol{
    padding-left:25px;
    margin:0;
    font-weight:bold;
}

#leaderboard li{
    margin-bottom:6px;
}

@media(max-width:768px){
    h1{
        font-size:24px;
    }

    p{
        font-size:18px;
    }

    #cheese{
        font-size:42px;
        padding:8px;
    }

    #leaderboard{
        width:160px;
        font-size:12px;
        top:10px;
        right:10px;
        padding:10px;
    }

    #backBtn{
        font-size:14px;
        padding:8px 12px;
    }
}
</style>

</head>
<body>

<h1>🧀 Cheese Game</h1>

<p>Time: <span id="timer">60</span></p>
<p>Score: <span id="score">0</span></p>

<div id="leaderboard">
    <h2>🏆 Leaderboard</h2>
    <ol id="leaderList"></ol>
</div>

<button id="cheese" onclick="eatCheese()">🧀</button>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<a href="index.html" id="backBtn">⬅ Back</a>

<script>
let score = 0;
let timeLeft = 60;
let musicStarted = false;
let gameOver = false;

function showLeaderboard(){
    let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];
    let leaderList = document.getElementById("leaderList");

    leaderList.innerHTML = "";

    leaderboard.forEach(function(player){
        let li = document.createElement("li");
        li.textContent = player.name + " - " + player.score;
        leaderList.appendChild(li);
    });
}

showLeaderboard();

let timerInterval = setInterval(function(){

    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    if(timeLeft <= 0){
        clearInterval(timerInterval);
        gameOver = true;

        document.getElementById("cheese").style.display = "none";

        let playerName = prompt("⏰ Time's Up! Enter Your Name:");

        if(playerName === null || playerName === ""){
            playerName = "Player";
        }

        let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

        leaderboard.push({
            name: playerName,
            score: score
        });

        leaderboard.sort(function(a, b){
            return b.score - a.score;
        });

        leaderboard = leaderboard.slice(0, 5);

        localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

        showLeaderboard();

        alert("Player: " + playerName + "\nScore: " + score);
    }

}, 1000);

function eatCheese(){

    if(gameOver){
        return;
    }

    if(!musicStarted){
        document.getElementById("music").play();
        musicStarted = true;
    }

    score++;
    document.getElementById("score").textContent = score;

    let cheese = document.getElementById("cheese");

    let maxX = window.innerWidth - cheese.offsetWidth;
    let maxY = window.innerHeight - cheese.offsetHeight - 80;

    let randomX = Math.random() * maxX;
    let randomY = Math.random() * maxY + 80;

    cheese.style.left = randomX + "px";
    cheese.style.top = randomY + "px";
    cheese.style.transform = "none";
}
</script>

</body>
</html>
