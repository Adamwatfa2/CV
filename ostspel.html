<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheese Game</title>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial, sans-serif;
    text-align:center;
    background:linear-gradient(135deg,#065f46,#10b981);
    height:100vh;
}

h1{
    color:white;
    margin-top:15px;
}

p{
    color:white;
    font-size:22px;
    font-weight:bold;
}

#score,
#timer{
    color:yellow;
}

#cheese{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%, -50%);
    font-size:50px;
    border:none;
    background:white;
    border-radius:20px;
    padding:10px;
    cursor:pointer;
}

#leaderboard{
    position:fixed;
    top:15px;
    right:15px;
    background:white;
    color:#065f46;
    padding:15px;
    border-radius:15px;
    width:210px;
    text-align:left;
}

#leaderboard h2{
    text-align:center;
    margin:0 0 10px;
}

#leaderboard ol{
    margin:0;
    padding-left:25px;
    font-weight:bold;
}

#messageBox{
    display:none;
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:white;
    color:#065f46;
    padding:25px;
    border-radius:20px;
    z-index:9999;
}

#playAgainBtn,
#backBtn{
    background:#10b981;
    color:white;
    border:none;
    padding:12px 18px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
    margin:8px;
}

@media(max-width:768px){
    #leaderboard{
        width:150px;
        font-size:12px;
        padding:10px;
    }

    #cheese{
        font-size:42px;
    }
}
</style>
</head>

<body>

<h1>🧀 Cheese Game</h1>

<p>Time: <span id="timer">60</span></p>
<p>Score: <span id="score">0</span></p>

<div id="leaderboard">
<h2>🏆 Leaderboard</h2>
<ol id="leaderList"></ol>
</div>

<button id="cheese" onclick="eatCheese()">🧀</button>

<div id="messageBox">
<h2>⏰ Time's Up!</h2>
<p>Your Score: <span id="finalScore">0</span></p>
<input id="playerName" placeholder="Enter your name">
<br><br>
<button onclick="saveScore()">Save Score</button>
<button id="playAgainBtn" onclick="playAgain()">🔁 Play Again</button>
<a href="index.html" id="backBtn">⬅ Back</a>
</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>
let score = 0;
let timeLeft = 60;
let musicStarted = false;
let gameOver = false;

function showLeaderboard(){
    let leaderboard = JSON.parse(localStorage.getItem("cheeseLeaderboard")) || [];
    let list = document.getElementById("leaderList");

    list.innerHTML = "";

    leaderboard.forEach(function(player){
        let li = document.createElement("li");
        li.textContent = player.name + " - " + player.score;
        list.appendChild(li);
    });
}

showLeaderboard();

let timerInterval = setInterval(function(){
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;

    if(timeLeft <= 0){
        clearInterval(timerInterval);
        gameOver = true;
        document.getElementById("cheese").style.display = "none";
        document.getElementById("finalScore").textContent = score;
        document.getElementById("messageBox").style.display = "block";
    }
}, 1000);

function eatCheese(){
    if(gameOver) return;

    if(!musicStarted){
        document.getElementById("music").play();
        musicStarted = true;
    }

    score++;
    document.getElementById("score").textContent = score;

    let cheese = document.getElementById("cheese");
    let maxX = window.innerWidth - cheese.offsetWidth;
    let maxY = window.innerHeight - cheese.offsetHeight - 80;

    cheese.style.left = Math.random() * maxX + "px";
    cheese.style.top = Math.random() * maxY + 80 + "px";
    cheese.style.transform = "none";
}

function saveScore(){
    let name = document.getElementById("playerName").value;

    if(name === ""){
        name = "Customer";
    }

    let leaderboard = JSON.parse(localStorage.getItem("cheeseLeaderboard")) || [];

    leaderboard.push({
        name: name,
        score: score
    });

    leaderboard.sort(function(a,b){
        return b.score - a.score;
    });

    leaderboard = leaderboard.slice(0,5);

    localStorage.setItem("cheeseLeaderboard", JSON.stringify(leaderboard));
    showLeaderboard();
}

function playAgain(){
    location.reload();
}
</script>

</body>
</html>
